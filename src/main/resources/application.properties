# Server
server.port=8080

# Database (PostgreSQL)
spring.datasource.url=jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5433}/${DB_NAME:fintech_db}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:fintech123}

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=fintechSuperSecretKey123456789012345678901234567890
app.jwt.expiration-ms=86400000

# App
app.name=Fintech API
logging.level.com.fintech=DEBUG

# Seed passwords (override via env vars SEED_ADMIN_PASSWORD / SEED_DEMO_PASSWORD)
app.seed.admin-password=${SEED_ADMIN_PASSWORD:Admin@1234}
app.seed.demo-password=${SEED_DEMO_PASSWORD:Jane@1234}

# Kafka
spring.kafka.bootstrap-servers=172.26.44.147:9092